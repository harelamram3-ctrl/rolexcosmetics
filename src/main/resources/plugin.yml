name: CosmeticsFitting
version: 1.0.0
main: com.cosmetics.fitting.CosmeticsFittingPlugin
api-version: 1.20
depend: [ItemsAdder, ProtocolLib]

commands:
  fitting:
    description: Open the cosmetics fitting room menu
    aliases: [cosmetics, dressingroom]
  fittingroom:
    description: Admin commands for setting up the fitting room area
    permission: cosmetics.admin

permissions:
  cosmetics.admin:
    default: op
  cosmetics.use:
    default: true
